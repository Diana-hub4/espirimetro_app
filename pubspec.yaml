name: espirimetro_app
description: Sistema clínico de espirometría con diagnóstico predictivo
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 📊 Gráficas clínicas
  fl_chart: ^0.66.0

  # 📄 Generación de PDF clínico
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3
  
  # 💾 Persistencia local (temporal antes de SQLite)
  shared_preferences: ^2.2.3

  # 📅 Formateo de fechas
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true